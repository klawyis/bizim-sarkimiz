<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damla ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Dancing Script', cursive;
  background: linear-gradient(135deg, #ffd1dc, #ffe4ec);
  overflow:hidden;
}

/* GİRİŞ BLUR */
#overlay {
  position:fixed;
  width:100%;
  height:100%;
  backdrop-filter: blur(20px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

/* BUTON */
button {
  padding:20px 40px;
  font-size:24px;
  border:none;
  border-radius:30px;
  background:#ff8fab;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
button:hover {
  transform:scale(1.1);
}

/* ANA ALAN */
.container {
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
}

/* PLAK */
.record {
  width:300px;
  height:300px;
  border-radius:50%;
  background: radial-gradient(circle, #222 40%, #000 60%);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:30px;
  animation: spin 4s linear infinite paused;
  transition: transform 1.2s cubic-bezier(.65,.05,.36,1);
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.move {
  transform: translateX(-200px);
}

/* LYRICS */
.lyrics {
  width:40%;
  margin-left:50px;
  font-size:28px;
  opacity:0;
  transform: translateY(30px);
  transition: all 1s ease;
}

.show {
  opacity:1;
  transform: translateY(0);
}

.line {
  opacity:0.3;
  transition:0.5s;
}

.active {
  opacity:1;
  font-size:34px;
  color:#ff4d6d;
}
</style>
</head>

<body>

<!-- GİRİŞ -->
<div id="overlay">
  <button onclick="start()">Bana tıkla güzelim 💖</button>
</div>

<div class="container">
  <div id="record" class="record">D ❤️ B</div>
  <div id="lyrics" class="lyrics"></div>
</div>

<!-- AUDIO -->
<audio id="audio">
  <!-- BURAYI DEĞİŞTİREBİLİRSİN -->
  <source src="sarki.mp3" type="audio/mpeg">
</audio>

<script>
const lyricsData = [
  { time: 5000, text: "🎵 (Giriş...)" },
  { time: 65000, text: "And I know..." },
  { time: 70000, text: "You don't love me anymore..." },
  { time: 90000, text: "This I love..." },
];

const lyricsContainer = document.getElementById("lyrics");
const audio = document.getElementById("audio");

/* LYRICS OLUŞTUR */
lyricsData.forEach(line => {
  const div = document.createElement("div");
  div.className = "line";
  div.innerText = line.text;
  lyricsContainer.appendChild(div);
});

/* BAŞLAT */
function start() {
  document.getElementById("overlay").style.display = "none";

  const record = document.getElementById("record");
  record.style.animationPlayState = "running";
  record.classList.add("move");

  lyricsContainer.classList.add("show");

  audio.play();
}

/* SENKRON */
audio.ontimeupdate = () => {
  const current = audio.currentTime * 1000;
  const lines = document.querySelectorAll(".line");

  lyricsData.forEach((line, index) => {
    if (current >= line.time) {
      lines.forEach(l => l.classList.remove("active"));
      lines[index].classList.add("active");
    }
  });
};
</script>

</body>
</html>
