<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damla ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Dancing Script', cursive;
  background: linear-gradient(135deg, #ffd1dc, #ffe4ec);
  overflow:hidden;
}

/* GİRİŞ */
#overlay {
  position:fixed;
  width:100%;
  height:100%;
  backdrop-filter: blur(20px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

button {
  padding:20px 40px;
  font-size:24px;
  border:none;
  border-radius:30px;
  background:#ff8fab;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
button:hover { transform:scale(1.1); }

/* ANA */
.container {
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
}

/* PLAK */
.record {
  width:300px;
  height:300px;
  border-radius:50%;
  background: radial-gradient(circle, #222 40%, #000 60%);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:30px;
  animation: spin 4s linear infinite paused;
  transition: transform 0.7s cubic-bezier(.65,.05,.36,1); /* 🔥 hızlandırıldı */
}

.move { transform: translateX(-220px); }

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* LYRICS */
.lyric-box {
  width:50%;
  height:100px;
  margin-left:60px;
  position:relative;
  overflow:hidden;
  opacity:0; /* 🔥 başta gizli */
  transition: opacity 0.8s ease;
}

.lyric-box.show {
  opacity:1;
}

.word {
  position:absolute;
  width:100%;
  font-size:34px;
  color:#ff4d6d;
  opacity:0;
  transform: translateY(30px);
  transition: all 0.8s ease;
}

.word.show {
  opacity:1;
  transform: translateY(0);
}

.word.hide {
  opacity:0;
  transform: translateY(-20px);
}
</style>
</head>

<body>

<div id="overlay">
  <button onclick="start()">Bana tıkla güzelim 💖</button>
</div>

<div class="container">
  <div id="record" class="record">D ❤️ B</div>
  <div class="lyric-box" id="lyricBox"></div>
</div>

<audio id="audio" preload="auto">
  <source src="sarki.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const box = document.getElementById("lyricBox");

/* SANİYE BAZLI */
const lyricsFlow = [
  { time: 65, text: "And I know..." },
  { time: 68, text: "You don't love me..." },
  { time: 71, text: "No more..." },
  { time: 75, text: "This I love..." },
  { time: 80, text: "This I love..." }
];

let currentIndex = 0;
let currentEl = null;

function showWord(text) {
  const el = document.createElement("div");
  el.className = "word";
  el.innerText = text;
  box.appendChild(el);

  requestAnimationFrame(() => {
    el.classList.add("show");
  });

  if (currentEl) {
    currentEl.classList.remove("show");
    currentEl.classList.add("hide");

    setTimeout(() => {
      if (currentEl) currentEl.remove();
    }, 800);
  }

  currentEl = el;
}

/* BAŞLAT */
function start() {
  document.getElementById("overlay").style.display = "none";

  const record = document.getElementById("record");
  record.style.animationPlayState = "running";

  // 🔥 önce plak kayıyor
  record.classList.add("move");

  // 🔥 lyrics gecikmeli geliyor
  setTimeout(() => {
    box.classList.add("show");
  }, 600); // plak kaydıktan sonra

  // 🔥 ses başlatma
  audio.pause();
  audio.currentTime = 65;

  audio.addEventListener("seeked", () => {
    audio.play();
  }, { once: true });
}

/* SENKRON */
audio.ontimeupdate = () => {
  const current = audio.currentTime;

  if (currentIndex < lyricsFlow.length && current >= lyricsFlow[currentIndex].time) {
    showWord(lyricsFlow[currentIndex].text);
    currentIndex++;
  }
};
</script>

</body>
</html>
