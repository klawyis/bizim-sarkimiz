<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadece Senin İçin... 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink-bg: #ffe5ec; --main-pink: #ffafcc; --dark-pink: #ff2d55; --text-color: #4a4a4a; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--pink-bg); font-family: 'Poppins', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--pink-bg); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        .intro-text { color: var(--text-color); font-family: 'Dancing Script', cursive; font-size: 2rem; margin-bottom: 20px; text-align: center; }
        .start-btn { background: var(--main-pink); border: none; padding: 15px 40px; border-radius: 50px; color: white; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 1.1rem; }
        #main-content { display: none; width: 100%; height: 100%; position: relative; justify-content: center; align-items: center; }
        .vinyl-wrapper { position: relative; transition: transform 2s ease-in-out; z-index: 10; }
        .vinyl-container { width: 260px; height: 260px; background: #000; border-radius: 50%; border: 8px solid #222; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(0,0,0,0.4); }
        .vinyl-label { width: 90px; height: 90px; background: white; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Dancing Script', cursive; text-align: center; font-size: 1.2rem; }
        .vinyl-label span { color: var(--dark-pink); font-size: 1.4rem; }
        #lyrics-container { position: absolute; color: var(--dark-pink); font-family: 'Dancing Script', cursive; font-size: 2.2rem; text-align: center; width: 300px; opacity: 0; transition: 1s; right: 10%; }
        .rotating { animation: rotateVinyl 3s linear infinite; }
        @keyframes rotateVinyl { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .move-left { transform: translateX(-150px); }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="intro-text">Hadi tıkla sevgilim...</div>
        <button class="start-btn" onclick="calistir()">Bana tıkla güzelim</button>
    </div>
    <div id="main-content">
        <div class="vinyl-wrapper" id="vinylWrapper">
            <div class="vinyl-container" id="vinyl">
                <div class="vinyl-label">D<br><span>❤</span><br>B</div>
            </div>
        </div>
        <div id="lyrics-container"></div>
    </div>

    <audio id="audio" crossOrigin="anonymous">
        <source src="https://www.mboxdrive.com/ThisILove_Cut.mp3" type="audio/mpeg">
    </audio>

    <script>
        const lyricsData = [
            { t: 1, text: "So if she's somewhere near me" },
            { t: 4, text: "I hope to God she hears me" },
            { t: 7, text: "There's no one else" },
            { t: 9, text: "Could ever make me feel" },
            { t: 12, text: "I'm so alive" },
            { t: 15, text: "I hoped she'd never leave me" },
            { t: 18, text: "Please God you must believe me" },
            { t: 22, text: "I've searched the universe" },
            { t: 26, text: "And found myself" },
            { t: 29, text: "Within' her eyes" }
        ];

        function calistir() {
            const audio = document.getElementById('audio');
            const overlay = document.getElementById('overlay');
            const mainContent = document.getElementById('main-content');
            const vinyl = document.getElementById('vinyl');
            const vinylWrapper = document.getElementById('vinylWrapper');
            const lyricsDiv = document.getElementById('lyrics-container');

            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                mainContent.style.display = 'flex';
                
                audio.play(); // Şarkı direkt internetten başlar
                
                vinyl.classList.add('rotating');
                setTimeout(() => {
                    vinylWrapper.classList.add('move-left');
                    lyricsDiv.style.opacity = '1';
                }, 500);

                audio.addEventListener('timeupdate', () => {
                    let cur = audio.currentTime; 
                    let line = lyricsData.find((l, i) => cur >= l.t && (!lyricsData[i+1] || cur < lyricsData[i+1].t));
                    if (line) lyricsDiv.innerText = line.text;
                });
            }, 800);
        }
    </script>
</body>
</html>
