<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadece Senin İçin... 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink-bg: #ffe5ec; --main-pink: #ffafcc; --dark-pink: #ff2d55; --text-color: #4a4a4a; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--pink-bg); font-family: 'Poppins', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* 1. Giriş Ekranı (Blur) */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 229, 236, 0.9); backdrop-filter: blur(20px); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s ease; }
        .intro-text { color: var(--text-color); font-family: 'Dancing Script', cursive; font-size: 2.2rem; margin-bottom: 20px; }
        .start-btn { background: var(--main-pink); border: none; padding: 15px 40px; border-radius: 50px; color: white; font-weight: 600; cursor: pointer; box-shadow: 0 5px 15px rgba(255,175,204,0.3); font-size: 1.1rem; transition: 0.3s; }
        .start-btn:hover { transform: scale(1.1); background: var(--dark-pink); }

        /* 2. Ana İçerik Kaplayıcı */
        #main-content { opacity: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transition: opacity 1.5s; position: relative; }

        /* 3. Plak ve Hareket */
        #vinylWrapper { position: relative; transition: transform 2s ease-in-out; z-index: 10; display: flex; justify-content: center; align-items: center; }
        .vinyl-container { width: 300px; height: 300px; background: #111; border-radius: 50%; border: 10px solid #000; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px rgba(0,0,0,0.3); position: relative; }
        .vinyl-rings { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: repeating-radial-gradient(circle, #222, #000 3px, #222 6px); opacity: 0.5; }
        .vinyl-label { width: 110px; height: 110px; background: white; border-radius: 50%; z-index: 5; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Dancing Script', cursive; text-align: center; }
        .vinyl-label span { color: var(--dark-pink); font-size: 1.8rem; }

        /* 4. Ortada Çıkacak Lyrics */
        #lyrics-container { position: absolute; color: var(--dark-pink); font-family: 'Dancing Script', cursive; font-size: 2.2rem; text-align: center; width: 100%; opacity: 0; transition: opacity 1s; z-index: 5; pointer-events: none; }
        
        /* Animasyon Sınıfları */
        .rotating { animation: rotateVinyl 3s linear infinite; }
        @keyframes rotateVinyl { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .move-left { transform: translateX(-250px); } /* Plak sola kayar */
        .show-lyrics { opacity: 1 !important; transform: translateX(150px); } /* Sözleri sağa doğru dengeler */
    </style>
</head>
<body>

    <div id="overlay">
        <div class="intro-text">Hadi tıkla sevgilim...</div>
        <button class="start-btn" onclick="baslat()">Bana tıkla güzelim</button>
    </div>

    <div id="main-content">
        <div id="vinylWrapper">
            <div class="vinyl-container" id="vinyl">
                <div class="vinyl-rings"></div>
                <div class="vinyl-label">D<br><span>❤</span><br>B</div>
            </div>
        </div>
        <div id="lyrics-container"></div>
    </div>

    <audio id="myAudio">
        <source src="sarki.mp3" type="audio/mpeg">
    </audio>

    <script>
        const lyricsData = [
            { time: 0, text: "" },
            { time: 1, text: "So if she's somewhere near me" },
            { time: 4, text: "I hope to God she hears me" },
            { time: 7, text: "There's no one else" },
            { time: 9, text: "Could ever make me feel" },
            { time: 12, text: "I'm so alive" },
            { time: 15, text: "I hoped she'd never leave me" },
            { time: 18, text: "Please God you must believe me" },
            { time: 22, text: "I've searched the universe" },
            { time: 26, text: "And found myself" },
            { time: 29, text: "Within' her eyes" }
        ];

        function baslat() {
            const audio = document.getElementById('myAudio');
            const overlay = document.getElementById('overlay');
            const mainContent = document.getElementById('main-content');
            const vinyl = document.getElementById('vinyl');
            const vinylWrapper = document.getElementById('vinylWrapper');
            const lyricsDiv = document.getElementById('lyrics-container');

            // 1. Ekranı Aç
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                mainContent.style.opacity = '1';
                
                // 2. Müziği Başlat (1:05 saniyesi = 65)
                audio.currentTime = 65;
                audio.play().catch(e => alert("Şarkı dosyası bulunamadı! Lütfen sarki.mp3 dosyasını yüklediğinden emin ol."));

                // 3. Animasyonları Tetikle
                vinyl.classList.add('rotating');
                vinylWrapper.classList.add('move-left');
                lyricsDiv.classList.add('show-lyrics');

                // 4. Sözleri Takip Et
                audio.addEventListener('timeupdate', () => {
                    const relativeTime = audio.currentTime - 65;
                    const line = lyricsData.find((l, index) => {
                        const next = lyricsData[index + 1];
                        return relativeTime >= l.time && (!next || relativeTime < next.time);
                    });
                    if (line) lyricsDiv.innerText = line.text;
                });
            }, 800);
        }
    </script>
</body>
</html>
