<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damla ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Dancing Script', cursive;
  background: linear-gradient(135deg, #ffd1dc, #ffe4ec);
  overflow:hidden;
}

#overlay {
  position:fixed;
  width:100%;
  height:100%;
  backdrop-filter: blur(20px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

button {
  padding:20px 40px;
  font-size:24px;
  border:none;
  border-radius:30px;
  background:#ff8fab;
  color:white;
  cursor:pointer;
}

.container {
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
  gap:60px;
}

/* PLAK */
.record {
  width:300px;
  height:300px;
  border-radius:50%;
  background: radial-gradient(circle, #222 40%, #000 60%);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:30px;

  transform: translateX(0);
  animation: spin 4s linear infinite paused;

  transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

.record.move {
  transform: translateX(-260px);
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* LYRICS */
.lyric-box {
  width:50%;
  height:120px;
  position:relative;
  overflow:hidden;
  opacity:0;
  transition: opacity 0.8s ease;
}

.lyric-box.show {
  opacity:1;
}

/* TEK SATIR */
.word {
  position:absolute;
  width:100%;
  font-size:38px;
  color:#ff4d6d;

  opacity:0;
  transform: translateY(25px);
  transition: all 0.7s ease;
}

.word.show {
  opacity:1;
  transform: translateY(0);
}

.word.hide {
  opacity:0;
  transform: translateY(-20px);
}
</style>
</head>

<body>

<div id="overlay">
  <button onclick="start()">Bana tıkla güzelim 💖</button>
</div>

<div class="container">
  <div id="record" class="record">D ❤️ B</div>
  <div class="lyric-box" id="box"></div>
</div>

<audio id="audio" preload="auto">
  <source src="sarki.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const box = document.getElementById("box");

const lyricsFlow = [
  { time: 66, text: "And I know..." },
  { time: 69, text: "You don't love me..." },
  { time: 71, text: "No more..." },
  { time: 73, text: "This I love..." },
  { time: 75, text: "This I love..." }
];

let i = 0;

/* 🔥 ÖNEMLİ FIX: aynı anda 2 yazı kontrolü */
let activeWords = [];

/* YAZI GÖSTER */
function showWord(text) {
  const el = document.createElement("div");
  el.className = "word";
  el.innerText = text;
  box.appendChild(el);

  requestAnimationFrame(() => {
    el.classList.add("show");
  });

  activeWords.push(el);

  // 🔥 eskiyi HEMEN silme → gecikmeli fade
  if (activeWords.length > 1) {
    const old = activeWords.shift();

    old.classList.remove("show");
    old.classList.add("hide");

    setTimeout(() => {
      old.remove();
    }, 900); // 👈 kritik fix: artık "flash" yok
  }
}

/* START */
function start() {
  document.getElementById("overlay").style.display = "none";

  const record = document.getElementById("record");
  record.classList.add("move");

  setTimeout(() => {
    box.classList.add("show");
  }, 600);

  audio.pause();
  audio.currentTime = 65;

  audio.addEventListener("seeked", () => {
    audio.play();
  }, { once: true });
}

/* SYNC */
audio.ontimeupdate = () => {
  const t = audio.currentTime;

  if (i < lyricsFlow.length && t >= lyricsFlow[i].time) {
    showWord(lyricsFlow[i].text);
    i++;
  }
};
</script>

</body>
</html>
